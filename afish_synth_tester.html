<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AFish Audio Laboratory (Synth Edition)</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px 20px 100px; 
        }
        h1 { color: #81C784; }
        h2 { border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 30px; }
        
        .controls { 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            display: flex;
            gap: 10px;
            position: sticky;
            top: 0;
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 10px; 
        }
        
        button {
            background-color: #2c3e50;
            color: white;
            border: 2px solid transparent;
            padding: 15px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
        }
        
        button:focus, button:hover {
            border-color: #81C784;
            background-color: #34495e;
            outline: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

    <h1>AFish Audio Laboratory</h1>
    
    <div class="controls">
        <button onclick="adjustVolume(-0.1)">Volume Down</button>
        <button onclick="adjustVolume(0.1)">Volume Up</button>
    </div>
    <div id="vol-announcer" aria-live="polite" class="sr-only">Volume is at 30 percent</div>

    <h2>Category 1: UI & Menus</h2>
    <div class="grid">
        <button onclick="playUI('move')">1. Menu Move (Blip)</button>
        <button onclick="playUI('select')">2. Menu Select (Chime)</button>
        <button onclick="playUI('error')">3. Error / Locked (Buzz)</button>
        <button onclick="playUI('transition')">4. Mode Transition (Swoosh)</button>
    </div>

    <h2>Category 2: Fish Finder (Sonar)</h2>
    <div class="grid">
        <button onclick="playSonar('ping')">5. Sonar Scan (Ping)</button>
        <button onclick="playSonar('echo')">6. Structure Echo (Deep)</button>
        <button onclick="playSonar('locked')">7. Target Locked (Confirm)</button>
    </div>

    <h2>Category 3: Physical Mechanics</h2>
    <div class="grid">
        <button onclick="playPhysics('motor')">8. Motor Cruising (Chug)</button>
        <button onclick="playPhysics('splash_silent')">9. Lure Splash (Silent)</button>
        <button onclick="playPhysics('splash_loud')">10. Lure Splash (Loud)</button>
    </div>

    <h2>Category 4: Combat</h2>
    <div class="grid">
        <button onclick="playCombat('bite')">11. Bite Thud (Heavy)</button>
        <button onclick="playCombat('reel')">12. Reel Clicking</button>
        <button onclick="playCombat('tension')">13. Line Tension (Rising)</button>
        <button onclick="playCombat('snap')">14. Line Snap (Crack!)</button>
    </div>

    <script>
        let actx;
        let masterGain;
        let currentVol = 0.3;

        function initAudio() {
            if (!actx) {
                actx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = actx.createGain();
                masterGain.gain.value = currentVol;
                masterGain.connect(actx.destination);
            }
        }

        function adjustVolume(amount) {
            currentVol += amount;
            if (currentVol < 0) currentVol = 0;
            if (currentVol > 1) currentVol = 1;
            if (masterGain) masterGain.gain.value = currentVol;
            document.getElementById('vol-announcer').textContent = "Volume is at " + Math.round(currentVol * 100) + " percent";
        }

        // Helper: Generate White Noise Buffer for splashes
        function createNoiseBuffer(duration) {
            const bufferSize = actx.sampleRate * duration;
            const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // Values between -1.0 and 1.0
            }
            return buffer;
        }

        // --- CATEGORY 1 & 2 (Unchanged from Part 2) ---
        function playUI(type) {
            initAudio();
            const now = actx.currentTime;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            if (type === 'move') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'select') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554.37, now + 0.1); 
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.35);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'transition') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.15);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.35);
            }
        }

        function playSonar(type) {
            initAudio();
            const now = actx.currentTime;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            if (type === 'ping') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
                osc.start(now); osc.stop(now + 1.5);
            } else if (type === 'echo') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.8);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.start(now); osc.stop(now + 0.85);
            } else if (type === 'locked') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.setValueAtTime(0, now + 0.05);
                osc.frequency.setValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.2, now + 0.1);
                gain.gain.setValueAtTime(0, now + 0.15);
                osc.frequency.setValueAtTime(1108.73, now + 0.2);
                gain.gain.setValueAtTime(0.2, now + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.45);
            }
        }

        // --- CATEGORY 3: PHYSICAL MECHANICS ---
        function playPhysics(type) {
            initAudio();
            const now = actx.currentTime;

            if (type === 'motor') {
                // A deep 40Hz wave modulated by a 10Hz LFO to create a chugging sound
                const osc = actx.createOscillator();
                const lfo = actx.createOscillator();
                const lfoGain = actx.createGain();
                const mainGain = actx.createGain();

                osc.type = 'sawtooth';
                osc.frequency.value = 40;
                
                lfo.type = 'sine';
                lfo.frequency.value = 10; // 10 chugs per second

                lfo.connect(lfoGain.gain);
                lfoGain.gain.value = 0.5; // Depth of the tremolo
                
                osc.connect(lfoGain);
                lfoGain.connect(mainGain);
                mainGain.connect(masterGain);

                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(0.4, now + 0.5);
                mainGain.gain.setValueAtTime(0.4, now + 2.0); // Run for 2 seconds
                mainGain.gain.linearRampToValueAtTime(0, now + 2.5); // Fade out

                osc.start(now);
                lfo.start(now);
                osc.stop(now + 2.5);
                lfo.stop(now + 2.5);
            } 
            else if (type === 'splash_silent' || type === 'splash_loud') {
                // Noise-based splashes
                const isLoud = (type === 'splash_loud');
                const duration = isLoud ? 0.6 : 0.15;
                
                const noiseSrc = actx.createBufferSource();
                noiseSrc.buffer = createNoiseBuffer(duration);
                
                const filter = actx.createBiquadFilter();
                filter.type = isLoud ? 'lowpass' : 'highpass';
                filter.frequency.value = isLoud ? 800 : 2000;

                const gain = actx.createGain();
                
                noiseSrc.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);

                gain.gain.setValueAtTime(isLoud ? 0.6 : 0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

                noiseSrc.start(now);
            }
        }

        // --- CATEGORY 4: COMBAT ---
        function playCombat(type) {
            initAudio();
            const now = actx.currentTime;
            
            if (type === 'bite') {
                // Classic kick drum synth
                const osc = actx.createOscillator();
                const gain = actx.createGain();
                osc.connect(gain);
                gain.connect(masterGain);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1); // Fast pitch drop
                
                gain.gain.setValueAtTime(0.8, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                
                osc.start(now);
                osc.stop(now + 0.3);
            }
            else if (type === 'reel') {
                // Rapid clicking
                const osc = actx.createOscillator();
                const gain = actx.createGain();
                osc.connect(gain);
                gain.connect(masterGain);

                osc.type = 'square';
                osc.frequency.value = 1000;

                gain.gain.setValueAtTime(0, now);
                // Create 4 quick clicks
                for(let i=0; i<4; i++) {
                    const t = now + (i * 0.08);
                    gain.gain.setValueAtTime(0.1, t);
                    gain.gain.setValueAtTime(0, t + 0.02);
                }
                osc.start(now);
                osc.stop(now + 0.4);
            }
            else if (type === 'tension') {
                // Rising sine wave panic tone
                const osc = actx.createOscillator();
                const gain = actx.createGain();
                osc.connect(gain);
                gain.connect(masterGain);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(800, now + 3.0); // Rises over 3 seconds
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.5);
                gain.gain.setValueAtTime(0.3, now + 2.8);
                gain.gain.linearRampToValueAtTime(0, now + 3.0);
                
                osc.start(now);
                osc.stop(now + 3.0);
            }
            else if (type === 'snap') {
                // Whip crack: Fast pitch sweep + noise
                const osc = actx.createOscillator();
                const gain1 = actx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(2000, now);
                osc.frequency.exponentialRampToValueAtTime(6000, now + 0.05);
                gain1.gain.setValueAtTime(0.5, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.connect(gain1).connect(masterGain);
                osc.start(now); osc.stop(now + 0.1);

                const noise = actx.createBufferSource();
                noise.buffer = createNoiseBuffer(0.1);
                const gain2 = actx.createGain();
                gain2.gain.setValueAtTime(0.5, now);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                noise.connect(gain2).connect(masterGain);
                noise.start(now);
            }
        }
    </script>
</body>
</html>
